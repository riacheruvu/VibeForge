  - description: "verifiable_instruction_following 1"
    vars:
      user_prompt: "Return valid JSON only with keys decision, risk, next_test. Do not include markdown or commentary. The decision is whether this eval is ready."
      preference_id: "verifiable_instruction_following"
      preference_type: "factuality"
    assert:
      - type: javascript
        metric: "verifiable_instruction_following"
        threshold: 0.5
        value: |
          if (/user request:/i.test(output) || /you are a concise, high-integrity/i.test(output)) return 0;
          const trimmed = output.trim();
          const text = trimmed.toLowerCase();
          let score = 0;
          try {
            const parsed = JSON.parse(trimmed);
            if (parsed && parsed.decision && parsed.risk && parsed.next_test) score += 0.55;
          } catch (_) {}
          if (/^\|.+\|\s*\n\|[-:| ]+\|/m.test(trimmed)) score += 0.4;
          if (/^1\.\s.+\n2\.\s.+\n3\.\s.+\n4\.\s.+/m.test(trimmed)) score += 0.4;
          if (!/markdown fence|here is|sure,|of course|additional note/.test(text) && !trimmed.includes(String.fromCharCode(96).repeat(3))) score += 0.2;
          if (trimmed.length < 700) score += 0.2;
          return Math.min(1, score);
